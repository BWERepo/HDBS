<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staging Quick Login</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
        }
        h1 { margin: 0 0 10px 0; font-size: 24px; color: #333; }
        p { margin: 0 0 20px 0; color: #666; font-size: 14px; }
        button {
            background: #4a90e2;
            color: white;
            border: none;
            padding: 12px 32px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #357abd; }
        button:active { background: #2a5a96; }
        .loading { opacity: 0.6; cursor: not-allowed; }
        .error { color: #e74c3c; margin-top: 10px; font-size: 14px; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Staging Login</h1>
        <p>Click to log in to the staging environment</p>
        <button id="loginBtn">Login to Staging</button>
        <div class="error" id="error"></div>
    </div>

    <script>
        document.getElementById('loginBtn').addEventListener('click', async function() {
            const btn = this;
            btn.disabled = true;
            btn.classList.add('loading');
            btn.textContent = 'Logging in...';

            try {
                // Create Basic Auth header
                const credentials = 'staging.handmadedesignsbysuzi:Gazing5-Coping8-Lurch2-Bucked5-Procedure4';
                const encoded = btoa(credentials);

                // Test auth with a simple HEAD request to a protected endpoint
                const response = await fetch('https://staging.handmadedesignsbysuzi.com/api/admin.php?action=version', {
                    method: 'HEAD',
                    headers: {
                        'Authorization': 'Basic ' + encoded
                    }
                });

                // If auth successful, navigate to admin
                if (response.status === 200 || response.status === 404) {
                    // Encode credentials in URL for the browser to use
                    window.location.href = 'https://' + credentials + '@staging.handmadedesignsbysuzi.com/#/admin';
                } else {
                    throw new Error('Authentication failed');
                }
            } catch (err) {
                btn.disabled = false;
                btn.classList.remove('loading');
                btn.textContent = 'Login to Staging';
                document.getElementById('error').textContent = 'Login failed. Please refresh and try again.';
                document.getElementById('error').style.display = 'block';
                console.error(err);
            }
        });
    </script>
</body>
</html>
